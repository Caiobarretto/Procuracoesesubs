ng:20px 24px;background:var(--navy);color:#fff;display:flex;align-items:center}.modal-header h2{margin:0;font-size:22px}.modal-header button{margin-left:auto;background:transparent;color:#fff;border:0;font-size:28px;cursor:pointer}.modal-body{padding:20px 24px;overflow:auto;max-height:calc(92vh - 78px)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.section{border:1px solid var(--line);border-radius:17px;padding:16px;margin-bottom:14px}.section h3{margin:0 0 12px}.chip-list{display:flex;gap:7px;flex-wrap:wrap}.chip{background:#f1f2f8;border:1px solid var(--line);padding:7px 9px;border-radius:10px;font-size:12px}.chip button{border:0;background:none;color:var(--danger);cursor:pointer}.steps{display:flex;gap:6px;margin-bottom:15px}.step{flex:1;text-align:center;padding:10px;border-radius:11px;background:#eef0f7;font-size:13px;font-weight:600}.step.active{background:var(--wine);color:#fff}.preview-page{width:794px;min-height:1123px;margin:12px auto;background:#fff;box-shadow:0 8px 35px rgba(0,0,0,.15);padding:72px 58px;font-size:12px;line-height:1.45}.preview-page h3{text-align:center;color:var(--wine)}.progress-box{padding:20px;border:1px solid var(--line);border-radius:16px}.progress-track{height:14px;background:#e9ebf5;border-radius:99px;overflow:hidden}.progress-fill{height:100%;background:var(--wine);width:0}.note{font-size:12px;color:var(--muted);line-height:1.45}.warning{background:#fff5e7;color:#714600;border:1px solid #f0d29f;border-radius:13px;padding:12px}.success{background:#e9f8f5;color:#075e54;border:1px solid #b9e1db;border-radius:13px;padding:12px}.context-menu{position:fixed;display:none;z-index:50;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.17);padding:6px}.context-menu button{display:block;width:100%;background:none;border:0;text-align:left;padding:9px 12px;border-radius:8px;cursor:pointer}.context-menu button:hover{background:#f1f2f8}.loading-overlay{position:fixed;inset:0;background:rgba(244,245,251,.88);z-index:100;display:none;align-items:center;justify-content:center}.loading-overlay.open{display:flex}.loading-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px 28px;box-shadow:0 18px 60px rgba(24,31,85,.18);min-width:320px;text-align:center}.spinner{width:34px;height:34px;border:4px solid #e7e9f3;border-top-color:var(--wine);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load-more{display:block;margin:14px auto}.perf-note{font-size:12px;color:var(--muted);padding:8px 14px;text-align:center}@media(max-width:900px){.filters{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:1fr 1fr}.grid2,.grid3{grid-template-columns:1fr}.topbar{padding:18px 16px}.topbar .title h1{font-size:19px}.topbar .cj-logo-wrap{min-width:170px;flex-basis:220px}.topbar .cj-logo{max-height:46px}.toolbar-row{align-items:flex-start}.toolbar-right{margin-left:0}.preview-page{transform-origin:top left;transform:scale(.72);margin-bottom:-300px}}

      if(!resp.ok)throw new Error('HTTP '+resp.status);

      if(blob.size<1000)throw new Error('Arquivo retornado vazio');
      const file=new File([blob],'Planilha para preenchimento de informações de subs.xlsx',{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

function cityForUF(uf){
  const map={PE:'Recife',PB:'João Pessoa',BA:'Salvador',CE:'Fortaleza',MA:'São Luís',RJ:'Rio de Janeiro',SP:'São Paulo'};
  return map[String(uf||'').trim().toUpperCase()]||'Recife';
}

function findColumnKey(keys, candidates){
  const nk=keys.map(k=>[k,norm(k)]);
  for(const c of candidates){const nc=norm(c);const hit=nk.find(([,v])=>v===nc);if(hit)return hit[0]}
  for(const c of candidates){const nc=norm(c);const hit=nk.find(([,v])=>v.startsWith(nc)||v.includes(nc));if(hit)return hit[0]}
  return '';
}
function nextSubsId(){

  return `SUBS-${String(max+1).padStart(2,'0')}`;
}

function downloadBlobDirect(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},1500);
}
function withTimeout(promise,ms,message){
  return Promise.race([promise,new Promise((_,rej)=>setTimeout(()=>rej(new Error(message)),ms))]);
}
const __assetCache={};
async function getAssetBytes(path){
  if(__assetCache[path]) return __assetCache[path];
  const res=await fetch(path);
  if(!res.ok) throw new Error('Não consegui carregar o arquivo visual: '+path);
  const bytes=new Uint8Array(await res.arrayBuffer());
  __assetCache[path]=bytes;
  return bytes;
}

  }catch(err){
    console.error('Erro na prévia:',err);
    target.innerHTML='<div class="warning"><strong>Não foi possível montar a prévia.</strong><br>'+escapeHtml(err.message||err)+'</div>';
  }
}
function renderBatch(){$('#modeArea').innerHTML=`<div class="section"><h3>Importação em lote</h3><p class="note">Agrupamento: GRUPO + UF + GESTOR. O processamento é feito no navegador.</p><div style="display:flex;gap:10px;flex-wrap:wrap"><label class="btn primary">Importar planilha<input id="batchFile" type="file" accept=".xlsx" hidden></label><a class="btn soft" href="modelos/modelo_importacao_substabelecimentos.xlsx" download>Baixar modelo</a><button class="btn secondary" id="generateBatch" disabled>Gerar documentos</button></div><div id="batchPreview" style="margin-top:14px"></div><div class="progress-box" id="batchProgress" style="display:none;margin-top:14px"><div><b id="pCount">0/0</b> — <span id="pName">Aguardando</span></div><div class="progress-track" style="margin:10px 0"><div class="progress-fill" id="pFill"></div></div><div class="note"><span id="pPct">0%</span> | Tempo estimado: <span id="pEta">—</span></div></div></div>`;let groups=[];$('#batchFile').onchange=async e=>{const file=e.target.files[0];if(!file)return;const x=XLSX.read(await file.arrayBuffer(),{type:'array'});const p=sheetToObjects(x.Sheets[x.SheetNames[0]]);const map=new Map();p.objects.forEach(r=>{const key=[val(r,['GRUPO']),val(r,['UF','UF ALOCADA']),val(r,['GESTOR'])].map(norm).join('|');if(!map.has(key))map.set(key,[]);map.get(key).push(r)});groups=[...map.entries()].map(([key,items])=>({key,items,grupo:val(items[0],['GRUPO']),uf:val(items[0],['UF','UF ALOCADA']),gestor:val(items[0],['GESTOR'])}));$('#batchPreview').innerHTML=`<div class="success">${p.objects.length} linhas identificadas em ${groups.length} documento(s).</div><table class="data-table"><thead><tr><th>GRUPO</th><th>UF</th><th>GESTOR</th><th>CLIENTES</th></tr></thead><tbody>${groups.map(g=>`<tr><td>${escapeHtml(g.grupo)}</td><td>${escapeHtml(g.uf)}</td><td>${escapeHtml(g.gestor)}</td><td>${g.items.length}</td></tr>`).join('')}</tbody></table>`;$('#generateBatch').disabled=false};$('#generateBatch').onclick=async()=>{if(!groups.length)return;$('#batchProgress').style.display='block';const start=Date.now();for(let i=0;i<groups.length;i++){const g=groups[i],pct=Math.round(i/groups.length*100);$('#pCount').textContent=`${i}/${groups.length}`;$('#pName').textContent=`${g.grupo} - ${g.uf}`;$('#pFill').style.width=pct+'%';$('#pPct').textContent=pct+'%';const elapsed=(Date.now()-start)/1000;$('#pEta').textContent=i?Math.round((elapsed/i)*(groups.length-i))+'s':'calculando...';await new Promise(r=>setTimeout(r,250));const clients=g.items.map(r=>({nome:val(r,['CLIENTE','RAZÃO SOCIAL']),cnpj:val(r,['CNPJ']),uf:g.uf,endereco:val(r,['ENDEREÇO','ENDERECO'])}));await generateDocx({clientes:clients,advogados:[],acordo10k:val(g.items[0],['ASSINATURA ATÉ R$ 10.000','ASSINATURA ATE R$ 10.000','ADVOGADO ACORDOS ATÉ R$ 10.000']),gestor:g.gestor,coordenador:val(g.items[0],['SÓCIO COORDENADOR','SOCIO COORDENADOR','COORDENADOR']),diretor:val(g.items[0],['DIRETOR']),precisaVal:'sim',validador:val(g.items[0],['GESTOR VALIDADOR'])})}$('#pCount').textContent=`${groups.length}/${groups.length}`;$('#pName').textContent='Concluído';$('#pFill').style.width='100%';$('#pPct').textContent='100%';$('#pEta').textContent='0s'}}
function showContext(x,y){$('#ctx').style.left=x+'px';$('#ctx').style.top=y+'px';$('#ctx').style.display='block'}
function idbSet(k,v){return new Promise((res,rej)=>{const rq=indexedDB.open('qca-subs',1);rq.onupgradeneeded=()=>rq.result.createObjectStore('s');rq.onsuccess=()=>{const tx=rq.result.transaction('s','readwrite');tx.objectStore('s').put(v,k);tx.oncomplete=res;tx.onerror=rej}})}function idbGet(k){return new Promise((res,rej)=>{const rq=indexedDB.open('qca-subs',1);rq.onupgradeneeded=()=>rq.result.createObjectStore('s');rq.onsuccess=()=>{const g=rq.result.transaction('s').objectStore('s').get(k);g.onsuccess=()=>res(g.result);g.onerror=rej}})}
$('#fileInput').onchange=e=>{const f=e.target.files[0];if(f)loadFile(f)};$('#btnBase').onclick=chooseBase;$('#btnAtualizar').onclick=async()=>{showLoading('Atualizando base','Lendo novamente a planilha. Isso pode levar alguns minutos.');await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));try{if(baseHandle){const f=await baseHandle.getFile();await loadFile(f)}else{hideLoading();chooseBase()}}catch(e){hideLoading();alert('Não foi possível atualizar a base: '+(e.message||e))}};$('#btnSalvar').onclick=saveBase;$('#btnExport').onclick=exportResult;$('#btnAux').onclick=auxModal;$('#btnMinuta').onclick=minutaModal;$('#modalClose').onclick=closeModal;$('#modal').onclick=e=>{if(e.target===$('#modal'))closeModal()};const debouncedFilter=debounce(applyFilters,500);['#q','#fUF','#fSubs','#fData','#fCat'].forEach(s=>$(s).addEventListener(s==='#q'?'input':'change',s==='#q'?debouncedFilter:applyFilters));$$('.tab').forEach(b=>b.onclick=async()=>{if(b.classList.contains('active'))return;const targetView=b.dataset.view;if(targetView==='documentos'){showLoading('Agrupando Informações','Isso pode levar alguns minutos');await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));}try{$$('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');view=targetView;applyFilters();if(targetView==='documentos')await new Promise(r=>setTimeout(r,80));}finally{if(targetView==='documentos')hideLoading()}});$('#btnEdit').onclick=editSelected;$('#btnDelete').onclick=deleteSelected;$('#ctx').onclick=e=>{const a=e.target.dataset.act;$('#ctx').style.display='none';if(a==='edit')editSelected();if(a==='delete')deleteSelected()};document.addEventListener('click',()=>$('#ctx').style.display='none');
(async()=>{const loaded=await tryLoadDefaultSharePointBase();if(loaded)return;try{baseHandle=await idbGet('baseHandle');if(baseHandle){const p=await baseHandle.queryPermission?.({mode:'read'});if(p==='granted'){const f=await baseHandle.getFile();await loadFile(f)}}}catch(e){console.warn(e)}})();
